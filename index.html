<script>
    function handleTrack() {
        const num = document.getElementById('trackNum').value.trim().toUpperCase();
        
        if(num === "") {
            alert("Please enter a valid Tracking ID.");
        } 
        // YOUR NEW ISRAEL -> FINLAND TEST CASE
        else if(num === "ISFI-99") {
            alert("✅ SHIPMENT LOCATED\n\n" +
                  "ID: ISFI-99\n" +
                  "Route: Tel Aviv, Israel 🇮🇱 → Helsinki, Finland 🇫🇮\n" +
                  "Status: DEPARTED ORIGIN ✈️\n" +
                  "Current Location: Tel Aviv Ben Gurion Airport\n\n" +
                  "Note: Shipment is cleared for export. Click the WhatsApp button for your official Waybill PDF.");
        } 
        // YOUR ORIGINAL TEST CASE
        else if(num === "SG777888") {
            alert("✅ SHIPMENT FOUND\n\n" +
                  "ID: SG777888\n" +
                  "Status: IN TRANSIT ✈️\n" +
                  "Location: Distribution Hub (Europe)\n" +
                  "Destination: Nigeria\n\n" +
                  "Note: Arriving at local customs shortly.");
        } 
        // DEFAULT MESSAGE
        else {
            alert("TRACKING UPDATE:\n\nID: " + num + "\nStatus: System Updating.\n\nPlease contact Swiftgo Support via WhatsApp for a real-time GPS update on this shipment.");
        }
    }

    function handleQuote() {
        alert("Quote Request Sent!\n\nOur team is comparing rates for your route. We will contact you via WhatsApp shortly.");
    }
</script>
