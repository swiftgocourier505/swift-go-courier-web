<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiftgo Courier Logistics | Professional Courier Broker</title>
    <style>
        body { font-family: sans-serif; margin: 0; background-color: #f0f2f5; color: #1a1a1a; padding-bottom: 80px; }
        header { background-color: #002d62; color: white; padding: 30px 20px; text-align: center; }
        nav { background: #001f44; padding: 12px; text-align: center; }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; font-size: 14px; }
        .hero { background: white; padding: 40px 20px; text-align: center; border-bottom: 4px solid #ffcc00; }
        .card { max-width: 500px; margin: 25px auto; padding: 25px; background: white; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { color: #002d62; margin-top: 0; }
        input, select, button { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { background-color: #002d62; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #ffcc00; color: #002d62; }
        .quote-btn { background-color: #ffcc00; color: #002d62; }
        footer { text-align: center; padding: 30px; color: #777; font-size: 13px; }

        /* WhatsApp Button Style */
        .whatsapp-float {
            position: fixed;
            width: 60px;
            height: 60px;
            bottom: 20px;
            right: 20px;
            background-color: #25d366;
            color: #FFF;
            border-radius: 50px;
            text-align: center;
            font-size: 30px;
            box-shadow: 2px 2px 3px #999;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<a href="https://wa.me/YOUR_NUMBER_HERE" class="whatsapp-float" target="_blank">
    <span style="font-size: 14px;">Chat</span>
</a>

<header>
    <h1 style="margin:0; letter-spacing: 2px;">SWIFTGO COURIER LOGISTICS</h1>
    <p style="margin:10px 0 0; opacity: 0.8;">Premium Courier Brokerage & Shipping Solutions</p>
</header>

<nav>
    <a href="#" onclick="alert('Menu system coming soon!')">HOME</a>
    <a href="#" onclick="alert('Our services include Express Air, Sea Freight, and Local Delivery.')">SERVICES</a>
    <a href="#" onclick="alert('Swiftgo: Delivering excellence since 2026.')">ABOUT</a>
    <a href="#" onclick="alert('Contact us at support@swiftgo.com')">CONTACT</a>
</nav>

<div class="hero">
    <h2>Track Your Shipment</h2>
    <div style="max-width: 400px; margin: 0 auto;">
        <input type="text" id="trackNum" placeholder="Enter Tracking Number">
        <button onclick="handleTrack()">TRACK NOW</button>
    </div>
</div>

<div class="card">
    <h2>Request a Quote</h2>
    <p style="font-size: 14px; color: #666;">Get the best rates from DHL, FedEx, and UPS.</p>
    <input type="text" placeholder="Pickup Country">
    <input type="text" placeholder="Destination Country">
    <select>
        <option>Document</option>
        <option>Parcel (under 5kg)</option>
        <option>Heavy Cargo (over 20kg)</option>
    </select>
    <button class="quote-btn" onclick="handleQuote()">GET BEST RATE</button>
</div>

<footer>
    &copy; 2026 SWIFTGO COURIER LOGISTICS | All Rights Reserved
</footer>

<script>
    function handleTrack() {
        const num = document.getElementById('trackNum').value;
        if(num === "") {
            alert("Please enter a tracking number.");
        } else {
            alert("Tracking ID: " + num + "\n\nStatus: System Updating. Please contact Swiftgo support via WhatsApp for live status.");
        }
    }

    function handleQuote() {
        alert("Quote Request Received!\n\nOur team will analyze the best rates and contact you shortly.");
    }
</script>

</body>
</html>
